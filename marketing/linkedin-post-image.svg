<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0e16"/>
      <stop offset="100%" stop-color="#06070c"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="8%" r="60%">
      <stop offset="0%" stop-color="#ff8c42" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#ff8c42" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ffb066"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.6">
    <circle cx="120" cy="120" r="1.6"/><circle cx="340" cy="80" r="1"/><circle cx="560" cy="150" r="1.3"/>
    <circle cx="980" cy="110" r="1.5"/><circle cx="1090" cy="240" r="1"/><circle cx="90" cy="300" r="1.2"/>
    <circle cx="1130" cy="520" r="1.2"/><circle cx="70" cy="600" r="1"/><circle cx="1100" cy="760" r="1.3"/>
    <circle cx="150" cy="980" r="1.2"/><circle cx="1050" cy="1040" r="1"/><circle cx="620" cy="1130" r="1.2"/>
  </g>
  <rect width="1200" height="1200" fill="url(#spot)"/>

  <!-- chip -->
  <g transform="translate(600,120)">
    <rect x="-205" y="-26" width="410" height="52" rx="26" fill="#11131d" stroke="#ff8c42" stroke-opacity="0.45"/>
    <text x="0" y="7" text-anchor="middle" fill="#ffb066" font-size="22" letter-spacing="5" font-weight="700">OPEN SOURCE · 100% FREE</text>
  </g>

  <!-- hook -->
  <text x="600" y="278" text-anchor="middle" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-2">I open-sourced a</text>
  <text x="600" y="356" text-anchor="middle" fill="url(#amber)" font-size="74" font-weight="800" letter-spacing="-2">250-point ad audit.</text>

  <!-- wordmark -->
  <text x="600" y="452" text-anchor="middle" fill="#9aa0b4" font-size="30" font-weight="500">Meet <tspan fill="#ffffff" font-weight="800">AdSignal</tspan> — the Paid-Ads Operating System</text>

  <!-- mock scorecard card -->
  <g transform="translate(190,520)">
    <rect width="820" height="300" rx="22" fill="#11131d" stroke="#262a36"/>
    <!-- gauge -->
    <g transform="translate(150,150)">
      <circle r="92" fill="none" stroke="#262a36" stroke-width="20"/>
      <circle r="92" fill="none" stroke="#e0a93f" stroke-width="20" stroke-linecap="round"
              stroke-dasharray="578" stroke-dashoffset="220" transform="rotate(-90)"/>
      <text x="0" y="8" text-anchor="middle" fill="#ffffff" font-size="58" font-weight="800">62</text>
      <text x="0" y="42" text-anchor="middle" fill="#9aa0b4" font-size="18">/ 100</text>
    </g>
    <!-- fix rows -->
    <g font-family="'JetBrains Mono','Courier New',monospace" font-size="20">
      <g transform="translate(310,60)">
        <rect width="62" height="30" rx="6" fill="#3a1d1a"/>
        <text x="31" y="21" text-anchor="middle" fill="#ff8a7a" font-weight="800" font-size="15">FAIL</text>
        <text x="80" y="22" fill="#e7e9f0" font-size="20">Tracking double-counts</text>
        <text x="500" y="22" text-anchor="end" fill="#ff8a7a" font-size="20" font-weight="700">~$3,100/mo</text>
      </g>
      <g transform="translate(310,120)">
        <rect width="62" height="30" rx="6" fill="#3a1d1a"/>
        <text x="31" y="21" text-anchor="middle" fill="#ff8a7a" font-weight="800" font-size="15">FAIL</text>
        <text x="80" y="22" fill="#e7e9f0" font-size="20">Winner budget-capped</text>
        <text x="500" y="22" text-anchor="end" fill="#ff8a7a" font-size="20" font-weight="700">~$2,400/mo</text>
      </g>
      <g transform="translate(310,180)">
        <rect width="62" height="30" rx="6" fill="#3a2c10"/>
        <text x="31" y="21" text-anchor="middle" fill="#ffc24d" font-weight="800" font-size="15">WARN</text>
        <text x="80" y="22" fill="#e7e9f0" font-size="20">Wasted search terms</text>
        <text x="500" y="22" text-anchor="end" fill="#ffc24d" font-size="20" font-weight="700">~$1,800/mo</text>
      </g>
      <line x1="310" y1="225" x2="780" y2="225" stroke="#262a36"/>
      <text x="310" y="258" fill="#6ee7a8" font-size="20" font-weight="700">▸ ~$9.4k/mo recoverable — ranked by $ impact</text>
    </g>
  </g>

  <!-- commands -->
  <g font-family="'JetBrains Mono','Courier New',monospace" font-size="26" font-weight="700" transform="translate(0,900)">
    <g transform="translate(190,0)">
      <rect width="186" height="58" rx="11" fill="#11131d" stroke="#ff8c42" stroke-opacity="0.5"/>
      <text x="93" y="38" text-anchor="middle" fill="#ffb066">/ads audit</text>
    </g>
    <g transform="translate(396,0)">
      <rect width="176" height="58" rx="11" fill="#11131d" stroke="#1f2230"/>
      <text x="88" y="38" text-anchor="middle" fill="#e7e9f0">/ads plan</text>
    </g>
    <g transform="translate(592,0)">
      <rect width="196" height="58" rx="11" fill="#11131d" stroke="#1f2230"/>
      <text x="98" y="38" text-anchor="middle" fill="#e7e9f0">/ads create</text>
    </g>
    <g transform="translate(808,0)">
      <rect width="202" height="58" rx="11" fill="#11131d" stroke="#1f2230"/>
      <text x="101" y="38" text-anchor="middle" fill="#e7e9f0">/ads compete</text>
    </g>
  </g>

  <text x="600" y="1058" text-anchor="middle" fill="#9aa0b4" font-size="26">250 rules · Google · Meta · LinkedIn · TikTok — free &amp; MIT-licensed</text>
  <text x="600" y="1120" text-anchor="middle" fill="#ffb066" font-size="28" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">github.com/ajaykhannaus/adsignal</text>
</svg>
